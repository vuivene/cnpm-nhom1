<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Nha Khoa STU</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body>
    <div class="login-container">
        <div class="login-left">
            <i class="fa-solid fa-tooth" style="font-size: 4rem;"></i>
            <h1>CHÀO MỪNG<br><span style="font-weight: 300;">TRỞ LẠI!</span></h1>
        </div>
        <div class="login-right">
            <div class="login-card">
                <h2>ĐĂNG NHẬP</h2>
                <p>Hệ thống quản lý phòng khám nha khoa</p>
                
                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for message in messages %}
                      <div style="color: #e74c3c; background-color: #fdedec; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; font-weight: 500;">
                          <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form action="/login" method="POST">
                    <input type="text" name="username" placeholder="Tên đăng nhập" required>
                    <input type="password" name="password" placeholder="Mật khẩu" required>
                    <a href="#" class="forgot-link">Quên mật khẩu?</a>
                    <button type="submit" class="login-btn">Xác Nhận</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
